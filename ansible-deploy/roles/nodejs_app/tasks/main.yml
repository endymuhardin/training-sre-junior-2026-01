---
# Infrastructure untuk aplikasi Payment Gateway Simulator.
# Copy source code + npm install + restart service dilakukan oleh
# GitHub Actions workflow (.github/workflows/deploy.yml), bukan di role ini.

# --- Node.js LTS dari NodeSource ---
# Repo AppStream default RHEL 9 memasang Node.js 16 (sudah EOL 2023).
# Kita pakai repo NodeSource supaya dapat LTS terbaru (lihat pg_nodejs_major).

- name: Impor GPG key NodeSource
  ansible.builtin.rpm_key:
    key: https://rpm.nodesource.com/gpgkey/ns-operations-public.key
    state: present

- name: Pasang repo NodeSource Node.js {{ pg_nodejs_major }}.x
  ansible.builtin.yum_repository:
    name: nodesource-nodejs
    description: "Node.js Packages - NodeSource (Node.js {{ pg_nodejs_major }}.x)"
    baseurl: "https://rpm.nodesource.com/pub_{{ pg_nodejs_major }}.x/nodistro/nodejs/$basearch"
    gpgcheck: yes
    gpgkey: https://rpm.nodesource.com/gpgkey/ns-operations-public.key
    enabled: yes
    # module_hotfixes memberi tahu dnf untuk mengabaikan modul nodejs
    # dari AppStream dan memprioritaskan paket dari repo ini.
    module_hotfixes: yes

- name: Reset modul nodejs AppStream (kalau ada versi lama terpasang via module)
  ansible.builtin.command: dnf -y module reset nodejs
  register: dnf_module_reset
  changed_when: "'Nothing to do' not in dnf_module_reset.stdout"
  failed_when: false

- name: Disable modul nodejs AppStream supaya tidak nge-bentrok
  ansible.builtin.command: dnf -y module disable nodejs
  register: dnf_module_disable
  changed_when: "'Nothing to do' not in dnf_module_disable.stdout"
  failed_when: false

# NodeSource package nodejs sudah membundle npm di /usr/lib/node_modules/npm.
# Paket npm AppStream RHEL (npm-1:8.19.4-*.el9_4) memiliki file di path yang
# sama, sehingga dnf transaction test gagal dengan "file conflicts". Kita
# hapus dulu paket nodejs/npm non-NodeSource sebelum instalasi baru.
- name: Deteksi apakah nodejs terpasang sekarang berasal dari NodeSource
  ansible.builtin.shell: |
    set -o pipefail
    rpm -q --queryformat='%{RELEASE}\n' nodejs 2>/dev/null || echo "NOT_INSTALLED"
  args:
    executable: /bin/bash
  register: nodejs_release
  changed_when: false

- name: Hapus nodejs/npm lama (AppStream) sebelum instal dari NodeSource
  ansible.builtin.dnf:
    name:
      - nodejs
      - npm
    state: absent
  when:
    - nodejs_release.stdout != "NOT_INSTALLED"
    - "'nodesource' not in nodejs_release.stdout"

- name: Instal Node.js {{ pg_nodejs_major }} (LTS) dari NodeSource
  ansible.builtin.dnf:
    name: nodejs
    state: latest
    allowerasing: yes
  notify: Restart Payment Gateway

# --- Bersih-bersih artefak aplikasi hello-world lama ---

- name: Cek apakah service express-app lama masih terpasang
  stat:
    path: /etc/systemd/system/express-app.service
  register: old_unit

- name: Stop dan disable service express-app lama
  systemd:
    name: express-app
    state: stopped
    enabled: no
  when: old_unit.stat.exists

- name: Hapus unit file express-app lama
  file:
    path: /etc/systemd/system/express-app.service
    state: absent
  when: old_unit.stat.exists

- name: Hapus direktori aplikasi lama /opt/express-app
  file:
    path: /opt/express-app
    state: absent

- name: Hapus nginx location lama (nodejs_app.conf)
  file:
    path: /etc/nginx/default.d/nodejs_app.conf
    state: absent
  notify: Restart Nginx

# --- Direktori aplikasi (source diisi oleh CI/CD) ---

- name: Buat direktori aplikasi payment-gateway
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ pg_run_user }}"
    group: "{{ pg_run_group }}"
    mode: '0755'
  loop:
    - "{{ pg_app_dir }}"
    - "{{ pg_log_dir }}"

- name: Cek apakah source aplikasi sudah pernah dideploy (oleh CI/CD)
  stat:
    path: "{{ pg_app_dir }}/src/app.js"
  register: pg_source_present

- name: Pasang systemd unit payment-gateway
  template:
    src: payment-gateway.service.j2
    dest: "/etc/systemd/system/{{ pg_service_name }}.service"
    owner: root
    group: root
    mode: '0644'
  notify: Restart Payment Gateway

- name: Aktifkan service payment-gateway (start dilakukan oleh CI/CD deploy)
  systemd:
    name: "{{ pg_service_name }}"
    enabled: yes
    daemon_reload: yes

# --- Sudoers untuk user CI/CD restart service tanpa password ---

- name: Izinkan user deploy restart service via sudo (NOPASSWD terbatas)
  copy:
    dest: /etc/sudoers.d/payment-gateway-deploy
    content: |
      # Dikelola oleh ansible — jangan edit manual.
      {{ pg_deploy_user }} ALL=(root) NOPASSWD: /usr/bin/systemctl restart {{ pg_service_name }}, /usr/bin/systemctl is-active {{ pg_service_name }}, /usr/bin/systemctl status {{ pg_service_name }}
    owner: root
    group: root
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s

# --- Nginx reverse proxy ---

- name: Cek status SELinux boolean
  ansible.builtin.command: getsebool httpd_can_network_connect
  register: sebool_status
  changed_when: false
  no_log: true

- name: Aktifkan httpd_can_network_connect secara permanen
  ansible.builtin.command: setsebool -P httpd_can_network_connect 1
  when: "'off' in sebool_status.stdout"

- name: Pasang konfigurasi Nginx reverse proxy /api/
  template:
    src: payment-gateway-nginx.conf.j2
    dest: /etc/nginx/default.d/payment-gateway.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart Nginx
