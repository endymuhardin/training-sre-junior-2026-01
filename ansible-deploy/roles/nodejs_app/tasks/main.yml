---
# Infrastructure untuk aplikasi Payment Gateway Simulator.
# Copy source code + npm install + restart service dilakukan oleh
# GitHub Actions workflow (.github/workflows/deploy.yml), bukan di role ini.

- name: Instal Node.js LTS
  dnf:
    name: nodejs
    state: present

# --- Bersih-bersih artefak aplikasi hello-world lama ---

- name: Cek apakah service express-app lama masih terpasang
  stat:
    path: /etc/systemd/system/express-app.service
  register: old_unit

- name: Stop dan disable service express-app lama
  systemd:
    name: express-app
    state: stopped
    enabled: no
  when: old_unit.stat.exists

- name: Hapus unit file express-app lama
  file:
    path: /etc/systemd/system/express-app.service
    state: absent
  when: old_unit.stat.exists

- name: Hapus direktori aplikasi lama /opt/express-app
  file:
    path: /opt/express-app
    state: absent

- name: Hapus nginx location lama (nodejs_app.conf)
  file:
    path: /etc/nginx/default.d/nodejs_app.conf
    state: absent
  notify: Restart Nginx

# --- Direktori aplikasi (source diisi oleh CI/CD) ---

- name: Buat direktori aplikasi payment-gateway
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ pg_run_user }}"
    group: "{{ pg_run_group }}"
    mode: '0755'
  loop:
    - "{{ pg_app_dir }}"
    - "{{ pg_log_dir }}"

- name: Cek apakah source aplikasi sudah pernah dideploy (oleh CI/CD)
  stat:
    path: "{{ pg_app_dir }}/src/app.js"
  register: pg_source_present

- name: Pasang systemd unit payment-gateway
  template:
    src: payment-gateway.service.j2
    dest: "/etc/systemd/system/{{ pg_service_name }}.service"
    owner: root
    group: root
    mode: '0644'
  notify: Restart Payment Gateway

- name: Aktifkan service payment-gateway (start dilakukan oleh CI/CD deploy)
  systemd:
    name: "{{ pg_service_name }}"
    enabled: yes
    daemon_reload: yes

# --- Sudoers untuk user CI/CD restart service tanpa password ---

- name: Izinkan user deploy restart service via sudo (NOPASSWD terbatas)
  copy:
    dest: /etc/sudoers.d/payment-gateway-deploy
    content: |
      # Dikelola oleh ansible — jangan edit manual.
      {{ pg_deploy_user }} ALL=(root) NOPASSWD: /usr/bin/systemctl restart {{ pg_service_name }}, /usr/bin/systemctl is-active {{ pg_service_name }}, /usr/bin/systemctl status {{ pg_service_name }}
    owner: root
    group: root
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s

# --- Nginx reverse proxy ---

- name: Cek status SELinux boolean
  ansible.builtin.command: getsebool httpd_can_network_connect
  register: sebool_status
  changed_when: false
  no_log: true

- name: Aktifkan httpd_can_network_connect secara permanen
  ansible.builtin.command: setsebool -P httpd_can_network_connect 1
  when: "'off' in sebool_status.stdout"

- name: Pasang konfigurasi Nginx reverse proxy /api/
  template:
    src: payment-gateway-nginx.conf.j2
    dest: /etc/nginx/default.d/payment-gateway.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart Nginx
