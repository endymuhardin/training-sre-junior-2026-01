---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway
  labels:
    app: payment-gateway
spec:
  # Mulai dari 2. HPA akan naik-turunkan antara minReplicas dan maxReplicas.
  replicas: 2
  selector:
    matchLabels:
      app: payment-gateway
  template:
    metadata:
      labels:
        app: payment-gateway
    spec:
      containers:
        - name: app
          image: endymuhardin/payment-gateway-js:2026.04.03
          ports:
            - containerPort: 3000
              name: http
          # resources.requests WAJIB di-set kalau HPA pakai metric "cpu"
          # dengan type "Utilization" — target dihitung relatif terhadap
          # requests. Kalau requests tidak di-set, HPA tidak punya basis
          # hitungan → hpa stuck di "unknown".
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: payment-gateway
spec:
  selector:
    app: payment-gateway
  ports:
    - port: 3000
      targetPort: http
      nodePort: 30300
      name: http
  # LoadBalancer (ServiceLB bawaan k3s) + nodePort eksplisit. Akses:
  #   http://<vps-ip>:30300  (via NodePort, firewall sudah open)
  #   http://<vps-ip>:3000   (via LB, perlu buka 3000 di firewall)
  type: LoadBalancer
---
# Horizontal Pod Autoscaler — tambah replica kalau rata-rata CPU
# utilization pod > 50% dari requests (100m). Di bawah threshold,
# HPA turunkan replica (dengan stabilization window default 5 menit).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment-gateway
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  # behavior tuning supaya demo terlihat jelas: scale-up cepat, scale-down
  # lambat. Default k8s: scale-up agresif, scale-down stabilization 5 min.
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
