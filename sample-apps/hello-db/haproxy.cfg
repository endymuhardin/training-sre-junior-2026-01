# HAProxy config untuk demo HA / LB / Failover hello-db.
#
# - mode http: parse HTTP supaya bisa health-check per-endpoint dan
#   menambahkan header observability.
# - roundrobin: request dibagi merata ke app1/app2/app3.
# - option httpchk GET /health: active health check berbasis HTTP response.
#   Backend yang fail dikeluarkan dari rotasi → demo failover.
# - inter 2s fall 2 rise 2: probe tiap 2 detik; 2x gagal = DOWN, 2x OK = UP.

global
  log stdout format raw local0
  maxconn 4096

defaults
  log global
  mode http
  option httplog
  timeout connect 5s
  timeout client  30s
  timeout server  30s
  retries 2

# Docker DNS embedded di 127.0.0.11. Pakai resolver supaya HAProxy me-resolve
# nama service tiap N detik — saat container app restart dengan IP baru,
# HAProxy otomatis ikuti tanpa reload.
resolvers docker
  nameserver dns1 127.0.0.11:53
  resolve_retries 3
  timeout resolve 2s
  timeout retry   1s
  hold valid      10s
  hold other      5s
  hold refused    5s
  hold nx         5s
  hold timeout    5s

frontend fe_http
  bind *:8080
  # Tag request dengan path backend yang dipilih — visible via X-LB-Backend di response.
  http-response set-header X-LB-Backend %[var(txn.backend_name)]
  http-request  set-var(txn.backend_name) str(be_app)
  default_backend be_app

backend be_app
  balance roundrobin
  option httpchk
  http-check send meth GET uri /health
  http-check expect status 200
  default-server inter 2s fall 2 rise 2 resolvers docker init-addr none
  server app1 app1:8080 check
  server app2 app2:8080 check
  server app3 app3:8080 check

# Stats UI di port terpisah supaya tidak nyampur dengan traffic aplikasi.
frontend fe_stats
  bind *:8404
  stats enable
  stats uri /stats
  stats refresh 5s
  stats admin if TRUE
  stats auth admin:admin
